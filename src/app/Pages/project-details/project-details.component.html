<section class="project-details" *ngIf="project">
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>{{ project.name }}</h1>
      <p>{{ project.description }}</p>
    </div>

    <!-- Cover Image -->
    <div class="cover">
      <img [src]="project.cover" alt="cover" />
    </div>

    <!-- Gallery -->
    <div class="gallery">
      <img
        *ngFor="let img of project.images"
        [src]="img"
        alt="project gallery image"
        (click)="openImage(img)"
      />
    </div>

    <!-- Technologies -->
    <div class="section">
      <h2>Technologies</h2>
      <div class="tags">
        <span *ngFor="let tech of project.technologies">{{ tech }}</span>
      </div>
    </div>

    <!-- Features -->
    <div class="section">
      <h2>Features</h2>
      <ul>
        <li *ngFor="let f of project.features">{{ f }}</li>
      </ul>
    </div>

    <!-- Key Achievements -->
    <div class="section highlight" *ngIf="project.keyAchievements?.length">
      <h2>Key Achievements</h2>
      <ul>
        <li *ngFor="let item of project.keyAchievements">🚀 {{ item }}</li>
      </ul>
    </div>

    <!-- Architecture -->
    <div class="section architecture" *ngIf="project.architecture?.length">
      <h2>Architecture</h2>
      <div class="tags">
        <span *ngFor="let arch of project.architecture">
          {{ arch }}
        </span>
      </div>
    </div>
    <!-- Actions -->
    <div class="actions">
      <a [href]="project.demoUrl" target="_blank" class="btn btn-primary me-3"
        >Live Demo</a
      >
      <a [href]="project.githubUrl" target="_blank" class="btn btn-secondary"
        >GitHub</a
      >
    </div>
  </div>
  <div *ngIf="selectedImage" class="lightbox" (click)="closeImage()">
    <img
      [src]="selectedImage"
      alt="expanded project gallery image"
      (click)="$event.stopPropagation()"
    />
  </div>
</section>
