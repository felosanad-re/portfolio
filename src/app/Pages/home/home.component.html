<div class="gradient-bg">
  <div class="container my-auto" id="home">
    <div class="row align-items-center min-vh-100">
      <!-- left side personal details 8-cols -->
      <div class="col-12 col-md-8">
        <h1 class="mb-3">
          Hello, I’m <br />
          <span class="name">Felopatter Sanad</span>
        </h1>
        <p class="text-black-50">
          I'm a
          <span class="fw-bold" [ngStyle]="{ color: '#a53dff' }">
            Junior Full Stack Developer
          </span>
          who enjoys turning ideas into real, working web applications.
        </p>

        <p class="text-black-50">
          Working with Angular, .NET, and SQL Server to build responsive and
          scalable applications.
        </p>

        <p class="text-black-50">
          Feel free to explore my projects or get in touch with me.
        </p>

        <button
          class="btn mt-4 text-white fw-bold download-cv"
          (click)="downloadCV()"
        >
          Download My CV
        </button>

        <!-- Scroll to top button -->
        <button
          class="scroll-to-top"
          (click)="scrollToTop()"
          *ngIf="showScrollButton"
        >
          <i class="fa-solid fa-arrow-up"></i>
        </button>
      </div>

      <!-- Right side Picture 4-cols -->
      <div
        class="col-12 col-md-4 d-flex justify-content-center align-items-center"
      >
        <figure class="m-0">
          <img
            src="../../../assets/Images/pic.jpeg"
            class="w-75 rounded-circle"
            alt="personal Picture"
          />
        </figure>
      </div>
    </div>
  </div>
</div>
