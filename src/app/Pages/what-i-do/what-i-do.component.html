<section class="what-i-do">
  <div class="row g-4">
    <h2 class="mb-4 text-center">What I Do</h2>
    @for (item of items; track $index) {
      <div class="col-12 col-md-6 col-lg-4">
        <div class="what-i-do-card mb-3" #card>
          <i [class]="item.icon"></i>
          <h3>{{ item.item }}</h3>
          <p>
            {{ item.description }}
          </p>
        </div>
      </div>
    }
  </div>
</section>
